sources:
  # 中国监管：国家金融监督管理总局（列表页）- 高质量源
  - name: "NFRA 监管动态"
    type: "web_list"
    region: "cn"
    url: "https://www.nfra.gov.cn/cn/view/pages/ItemList.html?itemPId=4116&itemId=4116&itemUrl=ItemListRightList.html"
    selectors:
      item: ".rightList li, .List li"
      title: "a"
      link: "a"
      date: "span, em"
    filters:
      title_min_length: 10
      exclude_keywords: ["首页", "栏目", "导航"]

  - name: "NFRA 政策法规"
    type: "web_list"
    region: "cn"
    url: "https://www.nfra.gov.cn/cn/view/pages/ItemList.html?itemPId=4115&itemId=4115&itemUrl=ItemListRightList.html"
    selectors:
      item: ".rightList li, .List li"
      title: "a"
      link: "a"
      date: "span, em"
    filters:
      title_min_length: 10
      exclude_keywords: ["首页", "栏目", "导航"]

  # 中国政策：国务院政策文件/最新政策
  - name: "中国政府网 最新政策"
    type: "web_list"
    region: "cn"
    url: "https://www.gov.cn/zhengce/zuixin.htm"
    selectors:
      item: "ul li, .news_box li"
      title: "a"
      link: "a"
      date: "span, .date"
    filters:
      title_min_length: 10

  # 国内财经媒体：保险频道 - P0 优化：添加 require_keywords 确保只抓取保险相关新闻
  - name: "新浪财经 保险"
    type: "web_list"
    region: "cn"
    url: "https://finance.sina.com.cn/money/insurance/"
    selectors:
      item: ".feed-card-item"
      title: "h2 a, .tit a"
      link: "a"
      date: "span.time, .time"
    filters:
      title_min_length: 12  # P0 优化：提高到 12 字符
      exclude_keywords: ["首页", "专题", "直播", "快讯"]
      require_keywords: ["保险", "寿险", "财险", "银保", "监管", "保单", "理赔"]  # P0 优化：必须包含保险关键词

  - name: "证券时报 保险标签"
    type: "web_list"
    region: "cn"
    url: "https://www.stcn.com/tags/保险"
    selectors:
      item: ".news-list li, .article-item"
      title: "a"
      link: "a"
      date: "span.time, time"
    filters:
      title_min_length: 12  # P0 优化：提高到 12 字符
      exclude_keywords: ["首页", "栏目", "公告", "快讯"]
      require_keywords: ["保险", "寿险", "财险", "银保", "监管"]  # P0 优化：必须包含保险关键词
